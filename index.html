<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관용표현 & 속담 퀴즈</title>
    <!-- Supabase 환경변수 주입 (Vite가 %VITE_*%를 .env.local 값으로 치환) -->
    <script>
        window.__SB__ = {
            url: "%VITE_SUPABASE_URL%",
            key: "%VITE_SUPABASE_ANON_KEY%"
        };
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Noto+Sans+KR:wght@300;500;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap');

        :root {
            /* Light Theme (Default) */
            --bg-body: #f3f4f6;
            --bg-container: #ffffff;
            --bg-input: #f9fafb;
            --bg-btn: #f3f4f6;
            --bg-btn-hover: #e5e7eb;
            --bg-dict-list: #fafafa;
            --border-color: #e5e7eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --text-dim: #9ca3af;
            --highlight: #d97706;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-body: #0a0a0a;
            --bg-container: #121212;
            --bg-input: #1e1e1e;
            --bg-btn: #1e1e1e;
            --bg-btn-hover: #2a2a2a;
            --bg-dict-list: #0f0f0f;
            --border-color: #333;
            --text-main: #ffffff;
            --text-muted: #888;
            --text-dim: #666;
            --highlight: #f3ec78;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Prevent browser scrollbar */
            padding: 2rem 0;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            position: relative;
            text-align: center;
            background: var(--bg-container);
            padding: 3rem 4rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            width: 50rem;
            max-width: 95vw;
            height: 48.75rem;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeIn 0.5s ease-out;
            transition: background 0.3s, border-color 0.3s;
        }

        .container::-webkit-scrollbar { width: 8px; }
        .container::-webkit-scrollbar-track { background: transparent; }
        .container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* Dictionary & Settings Modal Style */
        .dict-container {
            background: var(--bg-container);
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            width: 50rem;
            max-width: 95vw;
            height: 55rem;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-out;
            transition: background 0.3s, border-color 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: -webkit-linear-gradient(45deg, #d97706, #be123c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        [data-theme="dark"] h1 {
            background: -webkit-linear-gradient(45deg, #f3ec78, #af4261);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .menu-btn, .option-btn, .action-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            background: var(--bg-btn);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-btn:hover, .option-btn:hover, .action-btn:hover {
            background: var(--bg-btn-hover);
            transform: translateY(-2px);
        }

        .input-box {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 1.1rem;
            color: var(--text-main);
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .input-box::placeholder {
            color: var(--text-dim);
        }

        #game-area, #result-area, #dict-area, #settings-area, #setup-area, #ranking-area {
            display: none;
        }

        /* Game Area specific */
        .question {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .feedback { margin-top: 1rem; font-size: 1.1rem; font-weight: bold; min-height: 1.5rem; }
        .correct { color: #16a34a; }
        [data-theme="dark"] .correct { color: #4ade80; }
        .incorrect { color: #dc2626; }
        [data-theme="dark"] .incorrect { color: #f87171; }
        
        .info { color: #2563eb; margin-top: 0.5rem; font-size: 0.95rem; font-weight: normal; }
        [data-theme="dark"] .info { color: #60a5fa; }
        
        .header { display: flex; justify-content: space-between; margin-bottom: 2rem; font-size: 1rem; color: var(--text-dim); }

        /* Dictionary Area specific */
        .dict-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        .dict-badge {
            background: var(--text-main);
            color: var(--bg-container);
            font-size: 0.75rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 10px;
        }
        .dict-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .dict-title-row {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .dict-title-row h2 {
            font-size: 2rem;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Close Button (X icon) */
        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            color: var(--text-dim);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
        }
        .close-btn:hover {
            color: #ef4444; /* red */
            transform: scale(1.1);
        }

        /* Settings Button */
        .settings-btn {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            background: transparent;
            color: var(--text-dim);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .settings-btn:hover {
            color: var(--text-main);
            transform: rotate(45deg);
        }

        /* Creator Info */
        .creator-info {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            color: var(--text-dim);
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.8;
            pointer-events: none;
            text-align: right;
        }

        /* Version Tag */
        .version-tag {
            margin-top: 2px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            opacity: 0.75;
        }

        /* Tabs */
        .dict-tabs {
            display: flex;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 1rem;
        }
        .dict-tab {
            flex: 1 1 50%;
            width: 50%;
            padding: 0.8rem;
            text-align: center;
            color: var(--text-muted);
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .dict-tab.active {
            background: var(--text-main);
            color: var(--bg-container);
        }

        /* Search */
        .dict-search {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            margin-bottom: 1rem;
            font-size: 0.95rem;
            outline: none;
        }
        .dict-search::placeholder {
            color: var(--text-dim);
        }

        /* Table/List */
        .dict-list-container {
            flex: 1;
            overflow-y: scroll;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-dict-list);
        }
        .dict-list-container::-webkit-scrollbar { width: 8px; }
        .dict-list-container::-webkit-scrollbar-track { background: var(--bg-container); }
        .dict-list-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .dict-row {
            display: flex;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            align-items: flex-start;
        }
        .dict-row:last-child {
            border-bottom: none;
        }
        .dict-col-index {
            width: 3rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: right;
            padding-right: 0.75rem;
            flex-shrink: 0;
        }
        .dict-col-word {
            width: 35%;
            color: var(--text-main);
            font-weight: bold;
            font-size: 1rem;
            padding-right: 1rem;
            flex-shrink: 0;
        }
        .dict-divider {
            width: 1px;
            background: var(--border-color);
            height: 1.5rem;
            margin: 0 1rem;
            flex-shrink: 0;
        }
        .dict-col-meaning {
            flex: 1;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Close Button */
        .dict-close-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            background: var(--text-main);
            color: var(--bg-container);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }
        .dict-close-btn:hover {
            opacity: 0.8;
        }
        
        /* Settings Switches */
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.5rem;
            background: var(--bg-input);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .settings-item span {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* ---- 랭킹 / 리더보드 ---- */
        .lb-filters {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .lb-filters select {
            flex: 1;
            padding: 0.6rem 0.5rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.9rem;
            cursor: pointer;
            outline: none;
        }
        .leaderboard {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-dict-list);
            overflow: hidden;
        }
        .lb-row {
            display: flex;
            align-items: center;
            padding: 0.7rem 0.9rem;
            border-bottom: 1px solid var(--border-color);
            font-size: 0.95rem;
        }
        .lb-row:last-child { border-bottom: none; }
        .lb-row.me {
            background: color-mix(in srgb, var(--highlight) 18%, transparent);
        }
        .lb-rank {
            width: 2.4rem;
            text-align: right;
            padding-right: 0.7rem;
            font-weight: 700;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .lb-rank.medal { color: var(--highlight); }
        .lb-name {
            flex: 1;
            font-weight: 600;
            color: var(--text-main);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 0.5rem;
        }
        .lb-solved { font-weight: 700; color: var(--highlight); flex-shrink: 0; }
        .lb-acc { width: 3.6rem; text-align: right; color: var(--text-dim); font-size: 0.85rem; flex-shrink: 0; }
        .lb-empty { padding: 1.5rem; text-align: center; color: var(--text-dim); font-size: 0.9rem; }

        /* ---- 반응형 (모바일 / 작은 화면) ---- */
        @media (max-width: 600px) {
            html { font-size: 15px; }
            body {
                height: 100dvh;
                padding: 0.75rem 0;
            }
            h1 { font-size: 2rem; }

            .container {
                padding: 2rem 1.25rem;
                height: auto;
                max-height: 94vh;
                width: 100%;
                max-width: 94vw;
            }

            .dict-container {
                padding: 1.25rem;
                height: auto;
                max-height: 94vh;
                width: 100%;
                max-width: 94vw;
            }

            /* 인라인 height/padding 가진 설정 화면 override */
            #settings-area {
                height: auto !important;
                max-height: 94vh !important;
                padding: 2rem 1.25rem !important;
            }

            .menu-btn, .option-btn, .action-btn {
                font-size: 1rem;
                padding: 0.9rem;
            }

            .settings-btn {
                bottom: 0.75rem;
                left: 0.75rem;
                font-size: 1.3rem;
            }
            .creator-info {
                bottom: 0.75rem;
                right: 0.75rem;
                font-size: 0.8rem;
            }

            /* 도감 행: 좁은 화면에서 표현(위) / 뜻(아래) 세로 배치 */
            .dict-row {
                flex-wrap: wrap;
                align-items: baseline;
                padding: 0.85rem 0.9rem;
            }
            .dict-col-index {
                width: 2.2rem;
                text-align: right;
                padding-right: 0.5rem;
                font-size: 0.85rem;
            }
            .dict-col-word {
                width: auto;
                flex: 1 1 auto;
                padding-right: 0;
                font-size: 1rem;
            }
            .dict-divider { display: none; }
            .dict-col-meaning {
                flex-basis: 100%;
                width: 100%;
                margin-top: 0.35rem;
                padding-left: 2.2rem; /* 번호 폭만큼 들여써 표현과 정렬 */
                font-size: 0.9rem;
            }
        }

    </style>
</head>
<body>
    <div id="app">
        <!-- Settings Button -->
        <button class="settings-btn" id="global-settings-btn" title="설정" onclick="showSettings()">⚙️</button>

        <!-- Creator Info -->
        <div class="creator-info">
            <div>by. 청아초 삼다수반</div>
            <div class="version-tag" id="app-version"></div>
        </div>

        <!-- Main Menu -->
        <div class="container" id="main-menu">
            <h1>관용표현 & 속담 퀴즈</h1>
            <p style="margin-bottom: 1.5rem; color: var(--text-dim);">재미있게 배우는 우리말 관용표현과 속담!</p>

            <!-- 로그인/가입 (로그아웃 상태) -->
            <div id="login-box" style="margin-bottom: 1.5rem;">
                <input type="text" id="login-nickname" class="input-box" maxlength="12" placeholder="닉네임 (같은 닉네임이면 로그인)" style="margin: 0 0 0.5rem 0;" onkeypress="if(event.key==='Enter') login()">
                <button class="menu-btn" style="background: var(--highlight); color: #fff; border: none; font-weight: bold; margin: 0;" onclick="login()">로그인 / 가입</button>
                <div id="login-msg" style="min-height: 1.2rem; margin-top: 0.5rem; font-size: 0.9rem;"></div>
            </div>

            <!-- 플레이어 정보 (로그인 상태) -->
            <div id="player-box" style="display: none; align-items: center; justify-content: center; gap: 0.75rem; margin-bottom: 1.5rem; font-size: 1.1rem;">
                <span>👤 <b id="player-name"></b>님</span>
                <button class="action-btn" style="width: auto; padding: 0.4rem 1rem; margin: 0; font-size: 0.9rem;" onclick="logout()">로그아웃</button>
            </div>

            <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                <button class="menu-btn" style="border-color: var(--highlight); color: var(--highlight); margin: 0;" onclick="showDict()">📚 사전</button>
                <button class="menu-btn" style="border-color: var(--highlight); color: var(--highlight); margin: 0;" onclick="showRanking()">🏆 랭킹</button>
            </div>

            <!-- 게임 메뉴 (로그인 시에만 노출) -->
            <div id="game-menu" style="display: none;">
                <button class="menu-btn" onclick="openSetup(1)">1. 뜻 보고 맞추기 (주관식)</button>
                <button class="menu-btn" onclick="openSetup(2)">2. 단어 보고 뜻 맞추기 (객관식)</button>
                <button class="menu-btn" onclick="openSetup(3)">3. 초성 퀴즈 (주관식)</button>
                <button class="menu-btn" onclick="openSetup(4)">4. 뜻 적기 퀴즈 (키워드 주관식)</button>
            </div>
        </div>

        <!-- Ranking Area -->
        <div class="container" id="ranking-area" style="height: 55rem; max-height: 90vh; padding: 2.5rem; justify-content: flex-start;">
            <button class="close-btn" onclick="hideRanking()">✕</button>
            <h2 style="font-size: 2rem; margin-bottom: 0.3rem;">🏆 랭킹</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem; margin-bottom: 1.2rem;">같은 조건(모드·난이도·시간)끼리 맞힌 개수로 겨룹니다.</p>
            <div class="lb-filters">
                <select id="rank-mode" onchange="loadRanking()">
                    <option value="1">뜻→표현</option>
                    <option value="2">표현→뜻(객관식)</option>
                    <option value="3">초성 퀴즈</option>
                    <option value="4">뜻 적기</option>
                </select>
                <select id="rank-difficulty" onchange="loadRanking()">
                    <option value="easy">쉬움</option>
                    <option value="hard">하드</option>
                </select>
                <select id="rank-time" onchange="loadRanking()">
                    <option value="60">1분</option>
                    <option value="120">2분</option>
                    <option value="180">3분</option>
                    <option value="300">5분</option>
                </select>
            </div>
            <div id="ranking-list" class="leaderboard" style="flex: 1; overflow-y: auto;">
                <div class="lb-empty">불러오는 중…</div>
            </div>
            <button class="menu-btn" style="margin-top: 1rem;" onclick="hideRanking()">닫기</button>
        </div>

        <!-- Settings Area -->
        <div class="container" id="settings-area" style="max-width: 600px; height: 45rem; max-height: 90vh; padding: 4rem 3rem; overflow-y: auto; justify-content: flex-start;">
            <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; background: -webkit-linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><span style="-webkit-text-fill-color: initial; background: none;">⚙️</span> 환경 설정</h2>
            <p style="margin-bottom: 1.5rem; color: var(--text-dim);">앱의 테마와 환경을 설정할 수 있습니다.</p>

            <div class="settings-item">
                <span>🎨 화면 테마 (다크/라이트)</span>
                <button class="action-btn" style="width: auto; padding: 0.5rem 1.5rem;" onclick="toggleTheme()" id="theme-toggle-btn">다크 모드로 변경</button>
            </div>



            <button class="menu-btn" style="margin-top: auto;" onclick="hideSettings()">저장 및 닫기</button>
        </div>

        <!-- Dictionary (도감) Area -->
        <div class="dict-container" id="dict-area">
            <div class="dict-header">
                <span class="dict-badge">DICT</span>
                <span class="dict-subtitle">— 속담 + 관용어</span>
            </div>
            
            <div class="dict-title-row">
                <h2>📚 <span id="dict-main-title">속담 사전</span></h2>
            </div>

            <div class="dict-tabs">
                <div class="dict-tab active" id="tab-proverb" onclick="switchTab('속담')">속담 (<span id="count-proverb">0</span>)</div>
                <div class="dict-tab" id="tab-idiom" onclick="switchTab('관용어')">관용어 (<span id="count-idiom">0</span>)</div>
            </div>

            <input type="text" class="dict-search" id="dict-search-input" placeholder="🔍 검색 (예: 가는, 호랑이, 마음)" oninput="renderDictList()">

            <div class="dict-list-container" id="dict-list">
                <!-- 동적으로 채워짐 -->
            </div>

            <button class="dict-close-btn" onclick="hideDict()">닫기</button>
        </div>

        <!-- Setup Area -->
        <div class="container" id="setup-area">
            <button class="close-btn" onclick="hideSetup()">✕</button>
            <h2 style="font-size: 2rem; margin-bottom: 0.3rem;">🕹️ 게임 세부 설정</h2>
            <p id="setup-player" style="color: var(--text-dim); margin-bottom: 1.5rem;"></p>

            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label style="font-weight: bold; display: block; margin-bottom: 0.5rem;">⏱️ 제한시간 (전체) <span style="font-weight: normal; color: var(--text-dim);">시간 내 최대한 많이!</span></label>
                <select id="setup-time" class="input-box" style="margin: 0; cursor: pointer;">

            { type: "관용어", idiom: "파리를 날리다", meaning: "장사가 안되어 손님이 없다", chosung: "ㅍㄹㄹ ㄴㄹㄷ", keywords: ["장사가 안", "손님이 없"] },
            { type: "관용어", idiom: "혀를 내두르다", meaning: "몹시 놀라거나 어이없어 말을 못 하다", chosung: "ㅎㄹ ㄴㄷㄹㄷ", keywords: ["몹시 놀라", "질리"] },
            { type: "관용어", idiom: "화가 머리끝까지 치밀다", meaning: "몹시 심하게 화가 나다", chosung: "ㅎㄱ ㅁㄹㄲㄲㅈ ㅊㅁㄷ", keywords: ["몹시", "화가 나"] },
            { type: "관용어", idiom: "환장을 하다", meaning: "어떤 것에 정신없이 빠지다", chosung: "ㅎㅈㅇ ㅎㄷ", keywords: ["정신없이", "빠지"] },
        ];

        // ---- Supabase 랭킹 (REST/PostgREST 직접 호출) ----
        const SB_URL = (window.__SB__ && window.__SB__.url && window.__SB__.url.startsWith('http')) ? window.__SB__.url : '';
        const SB_KEY = (window.__SB__ && window.__SB__.key && !window.__SB__.key.includes('%VITE')) ? window.__SB__.key : '';
        const SB_ENABLED = !!(SB_URL && SB_KEY);
        const SB_HEADERS = { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}`, 'Content-Type': 'application/json' };

        // 게임 결과 1건 저장 → 성공 시 삽입된 행 반환
        async function sbInsertScore(rec) {
            if (!SB_ENABLED) return null;
            try {
                const res = await fetch(`${SB_URL}/rest/v1/scores`, {
                    method: 'POST',
                    headers: { ...SB_HEADERS, 'Prefer': 'return=representation' },
                    body: JSON.stringify(rec)
                });
                if (!res.ok) throw new Error(`insert ${res.status}: ${await res.text()}`);
                const rows = await res.json();
                return rows[0] || null;
            } catch (e) { console.warn('[랭킹] 저장 실패:', e.message); return null; }
        }

        // 조건별 리더보드 조회 (맞힌 개수 desc → 정확도 desc → 먼저 달성 우선)
        async function sbFetchLeaderboard(mode, difficulty, timeLimit, limit = 30) {
            if (!SB_ENABLED) return null;
            try {
                const q = `mode=eq.${mode}&difficulty=eq.${difficulty}&time_limit=eq.${timeLimit}` +
                          `&select=id,nickname,solved,accuracy,created_at` +
                          `&order=solved.desc,accuracy.desc,created_at.asc&limit=${limit}`;
                const res = await fetch(`${SB_URL}/rest/v1/scores?${q}`, { headers: SB_HEADERS });
                if (!res.ok) throw new Error(`select ${res.status}: ${await res.text()}`);
                return await res.json();
            } catch (e) { console.warn('[랭킹] 조회 실패:', e.message); return null; }
        }

        // 리더보드 렌더 (rows 없으면 안내). highlightId와 일치하는 행 강조
        function renderLeaderboard(container, rows, highlightId) {
            if (!SB_ENABLED) {
                container.innerHTML = '<div class="lb-empty">랭킹 서버가 설정되지 않았습니다.<br>(.env.local 확인)</div>';
                return;
            }
            if (rows === null) {
                container.innerHTML = '<div class="lb-empty">랭킹을 불러오지 못했습니다.<br>네트워크나 테이블 설정을 확인하세요.</div>';
                return;
            }
            if (rows.length === 0) {
                container.innerHTML = '<div class="lb-empty">아직 기록이 없어요. 첫 기록의 주인공이 되어보세요! 🎉</div>';
                return;
            }
            container.innerHTML = rows.map((r, i) => {
                const rank = i + 1;
                const medal = rank <= 3 ? ' medal' : '';
                const mark = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : rank;
                const me = (highlightId != null && r.id === highlightId) ? ' me' : '';
                const acc = (r.accuracy != null) ? Math.round(r.accuracy * 100) + '%' : '-';
                const nick = escapeHtml(r.nickname);
                return `<div class="lb-row${me}">
                    <div class="lb-rank${medal}">${mark}</div>
                    <div class="lb-name">${nick}</div>
                    <div class="lb-solved">${r.solved}개</div>
                    <div class="lb-acc">${acc}</div>
                </div>`;
            }).join('');
        }

        // 닉네임 등 사용자 입력이 innerHTML에 들어갈 때 XSS 방지용 이스케이프
        function escapeHtml(s) {
            return String(s).replace(/[&<>"']/g, c => (
                { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
            ));
        }

        // 닉네임으로 플레이어 조회 (있으면 행, 없으면 null)
        async function sbFindPlayer(nick) {
            if (!SB_ENABLED) return null;
            try {
                const res = await fetch(`${SB_URL}/rest/v1/players?nickname=eq.${encodeURIComponent(nick)}&select=nickname&limit=1`, { headers: SB_HEADERS });
                if (!res.ok) throw new Error(`find ${res.status}`);
                const rows = await res.json();
                return rows[0] || null;
            } catch (e) { console.warn('[플레이어] 조회 실패:', e.message); return undefined; } // undefined = 확인 불가
        }

        // 플레이어 신규 등록 (성공 true, 중복이면 409)
        async function sbRegisterPlayer(nick) {
            if (!SB_ENABLED) return false;
            try {
                const res = await fetch(`${SB_URL}/rest/v1/players`, {
                    method: 'POST',
                    headers: { ...SB_HEADERS, 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ nickname: nick })
                });
                if (res.status === 409) return 'exists';
                if (!res.ok) throw new Error(`register ${res.status}`);
                return true;
            } catch (e) { console.warn('[플레이어] 등록 실패:', e.message); return false; }
        }

        // ---- 로그인 / 가입 (비밀번호 없음, 같은 닉네임이면 로그인) ----
        const PLAYER_KEY = 'gystudy-player';
        let currentPlayer = null;

        async function login() {
            const input = document.getElementById('login-nickname');
            const msg = document.getElementById('login-msg');
            const nick = input.value.trim().replace(/\s+/g, ' ').slice(0, 12);
            if (!nick) { msg.style.color = '#dc2626'; msg.innerText = '닉네임을 입력하세요.'; return; }

            msg.style.color = 'var(--text-dim)';
            msg.innerText = '확인 중…';

            let kind = 'local'; // 'login' | 'signup' | 'local'
            if (SB_ENABLED) {
                const found = await sbFindPlayer(nick);
                if (found) {
                    kind = 'login';
                } else if (found === null) {
                    const reg = await sbRegisterPlayer(nick);
                    kind = (reg === 'exists') ? 'login' : (reg === true ? 'signup' : 'local');
                } else {
                    kind = 'local'; // 서버 확인 불가 → 로컬로만 진행
                }
            }

            setCurrentPlayer(nick);
            msg.style.color = '#16a34a';
            msg.innerText = kind === 'signup' ? `가입 완료! 환영합니다, ${nick}님 🎉`
                          : kind === 'login'  ? `${nick}님 로그인 완료 👋`
                          : `${nick}님으로 시작합니다.`;
        }

        function setCurrentPlayer(nick) {
            currentPlayer = nick;
            try { localStorage.setItem(PLAYER_KEY, nick); } catch (e) {}
            updatePlayerUI();
        }

        function logout() {
            currentPlayer = null;
            try { localStorage.removeItem(PLAYER_KEY); } catch (e) {}
            document.getElementById('login-nickname').value = '';
            document.getElementById('login-msg').innerText = '';
            updatePlayerUI();
        }

        function updatePlayerUI() {
            const loggedIn = !!currentPlayer;
            document.getElementById('login-box').style.display = loggedIn ? 'none' : 'block';
            document.getElementById('player-box').style.display = loggedIn ? 'flex' : 'none';
            document.getElementById('game-menu').style.display = loggedIn ? 'block' : 'none';
            if (loggedIn) document.getElementById('player-name').innerText = currentPlayer;
        }

        // ---- Settings 저장/복원 (localStorage) ----
        const SETTINGS_KEY = 'gystudy-settings';

        function saveSettings() {
            try {
                localStorage.setItem(SETTINGS_KEY, JSON.stringify({
                    isDarkMode
                }));
            } catch (e) { /* localStorage 미지원/차단 시 무시 */ }
        }

        function loadSettings() {
            let saved = null;
            try {
                saved = JSON.parse(localStorage.getItem(SETTINGS_KEY));
            } catch (e) { /* 파싱 실패 시 기본값 사용 */ }
            if (!saved) return;

            // 테마 복원
            if (saved.isDarkMode) {
                isDarkMode = true;
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('theme-toggle-btn').innerText = '라이트 모드로 변경';
            }
        }

        // ---- Settings Theme & Logic ----
        let isDarkMode = false;
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle-btn');

            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = '라이트 모드로 변경';
            } else {
                body.removeAttribute('data-theme');
                btn.innerText = '다크 모드로 변경';
            }
            saveSettings();
        }

        function showSettings() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('settings-area').style.display = 'flex';
            document.getElementById('global-settings-btn').style.display = 'none';
        }

        function hideSettings() {
            document.getElementById('settings-area').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('global-settings-btn').style.display = 'block';
        }

        // ---- 도감(Dictionary) Logic ----
        let currentDictType = '속담'; // 기본값

        function initDictData() {
            const proverbCount = DB.filter(item => item.type === "속담").length;
            const idiomCount = DB.filter(item => item.type === "관용어").length;
            document.getElementById('count-proverb').innerText = proverbCount;
            document.getElementById('count-idiom').innerText = idiomCount;
        }

        function showDict() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('global-settings-btn').style.display = 'none';
            document.getElementById('dict-area').style.display = 'flex';
            initDictData();
            switchTab('속담'); // 열 때 항상 속담 탭으로 초기화
        }

        function hideDict() {
            document.getElementById('dict-area').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('global-settings-btn').style.display = 'block';
        }

        function switchTab(type) {
            currentDictType = type;
            document.getElementById('dict-main-title').innerText = `${type} 사전`;
            
            // 탭 스타일 변경
            document.getElementById('tab-proverb').className = type === '속담' ? 'dict-tab active' : 'dict-tab';
            document.getElementById('tab-idiom').className = type === '관용어' ? 'dict-tab active' : 'dict-tab';
            
            // 검색어 초기화
            document.getElementById('dict-search-input').value = '';
            
            renderDictList();
        }

        function renderDictList() {
            const listContainer = document.getElementById('dict-list');
            const searchKeyword = document.getElementById('dict-search-input').value.trim().toLowerCase();
            
            let filtered = DB.filter(item => item.type === currentDictType);
            
            if (searchKeyword) {
                filtered = filtered.filter(item => 
                    item.idiom.toLowerCase().includes(searchKeyword) || 
                    (item.meaning && item.meaning.toLowerCase().includes(searchKeyword))
                );
            }

            let html = '';
            if (filtered.length === 0) {
                html = '<div style="padding: 2rem; text-align: center; color: var(--text-dim);">검색 결과가 없습니다.</div>';
            } else {
                filtered.forEach((item, index) => {
                    const exactMeaning = item.meaning;
                    html += `
                        <div class="dict-row">
                            <div class="dict-col-index">${index + 1}</div>
                            <div class="dict-col-word">${item.idiom}</div>
                            <div class="dict-divider"></div>
                            <div class="dict-col-meaning">${exactMeaning}</div>
                        </div>
                    `;
                });
            }
            
            listContainer.innerHTML = html;
        }

        // ---- Quiz Game Logic ----
        let currentMode = 1;
        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        
        // 추가된 상태 변수들
        let playerNickname = "플레이어";
        let totalTime = 120;     // 전체 제한시간(초)
        let timerInterval = null;
        let timeRemaining = 0;
        let answered = 0;        // 시도한 문제 수
        let gameOver = false;
        let setupMode = 1;
        let difficulty = 'easy'; // 'easy' | 'hard' — 모드4('뜻 적기') 채점 엄격도

        function shuffle(array) {
            let currentIndex = array.length,  randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function goHome() {
            stopTimer();
            document.getElementById('result-area').style.display = 'none';
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('setup-area').style.display = 'none';
            document.getElementById('ranking-area').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('global-settings-btn').style.display = 'block';
        }

        function openSetup(mode) {
            if (!currentPlayer) { alert('먼저 닉네임으로 로그인해 주세요.'); return; }
            setupMode = mode;
            document.getElementById('setup-player').innerText = `👤 ${currentPlayer}님`;
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('global-settings-btn').style.display = 'none';
            document.getElementById('setup-area').style.display = 'flex';
        }

        function hideSetup() {
            goHome();
        }

        function executeGameStart() {
            if (!currentPlayer) { alert('먼저 닉네임으로 로그인해 주세요.'); goHome(); return; }
            playerNickname = currentPlayer;
            totalTime = parseInt(document.getElementById('setup-time').value);
            difficulty = document.getElementById('setup-difficulty').value;

            document.getElementById('setup-area').style.display = 'none';
            startGame(setupMode);
        }

        function startGame(mode) {
            currentMode = mode;
            score = 0;
            currentIndex = 0;
            answered = 0;
            gameOver = false;

            // 전체를 섞어 제한시간 동안 최대한 많이 풀도록
            currentQuestions = shuffle([...DB]);

            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('game-area').style.flexDirection = 'column';

            startGameTimer();
            loadQuestion();
        }

        function formatTime(sec) {
            const m = Math.floor(sec / 60), s = sec % 60;
            return `${m}:${String(s).padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            const span = document.getElementById('time-left');
            span.innerText = formatTime(Math.max(0, timeRemaining));
            // 10초 이하 강조
            document.getElementById('timer-display').style.color = timeRemaining <= 10 ? '#dc2626' : '#ef4444';
        }

        // 전체 제한시간 카운트다운 (문제 넘어가도 계속 흐름)
        function startGameTimer() {
            stopTimer();
            timeRemaining = totalTime;
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function loadQuestion() {
            document.getElementById('feedback-text').innerText = '';
            document.getElementById('info-text').innerText = '';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('score-display').innerText = `맞힘: ${score}`;
            document.getElementById('progress-display').innerText = `문제 ${currentIndex + 1}`;
            
            const q = currentQuestions[currentIndex];
            const qText = document.getElementById('question-text');
            const inputSec = document.getElementById('input-section');
            const optionsSec = document.getElementById('options-section');
            const inputField = document.getElementById('answer-input');

            inputSec.style.display = 'none';
            optionsSec.style.display = 'none';
            inputField.value = '';

            let label = q.type === "속담" ? "속담" : "관용표현";
            let exactMeaning = q.meaning;

            if (currentMode === 1) {
                qText.innerText = `뜻: ${exactMeaning}\n\n이 뜻을 가진 ${label}은(는)?`;
                inputSec.style.display = 'block';
                inputField.focus();
            } else if (currentMode === 2) {
                qText.innerText = `${label}: "${q.idiom}"\n\n이 ${label}의 올바른 뜻은?`;
                optionsSec.style.display = 'block';
                optionsSec.innerHTML = '';
                
                let options = [exactMeaning];
                let others = shuffle([...DB].filter(item => item.idiom !== q.idiom)).slice(0, 3);
                others.forEach(o => options.push(o.meaning));
                options = shuffle(options);
                
                options.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => checkOption(opt, exactMeaning);
                    optionsSec.appendChild(btn);
                });
            } else if (currentMode === 3) {
                qText.innerText = `초성: ${q.chosung}\n뜻: ${exactMeaning}\n\n이 ${label}은(는)?`;
                inputSec.style.display = 'block';
                inputField.focus();
            } else if (currentMode === 4) {
                qText.innerText = `${label}: "${q.idiom}"\n\n이 ${label}의 뜻을 적어보세요.\n(핵심 단어가 포함되어야 합니다)`;
                inputSec.style.display = 'block';
                inputField.focus();
            }
        }

        function submitAnswer() {
            if (gameOver) return;
            const q = currentQuestions[currentIndex];
            const input = document.getElementById('answer-input').value.trim();
            if (!input) return;

            let isCorrect = false;

            if (currentMode === 1 || currentMode === 3) {
                if (input.replace(/\s/g, '') === q.idiom.replace(/\s/g, '')) {
                    isCorrect = true;
                }
            } else if (currentMode === 4) {
                let matchCount = q.keywords.filter(kw => input.includes(kw)).length;
                // 쉬움: 2개 이상, 하드: 키워드 전부 포함
                const required = difficulty === 'hard' ? q.keywords.length : Math.min(2, q.keywords.length);
                if (matchCount >= required) {
                    isCorrect = true;
                }
            }

            showFeedback(isCorrect);
        }

        function checkOption(selected, correct) {
            if (gameOver) return;
            showFeedback(selected === correct);
        }

        function showFeedback(isCorrect) {
            // 전체 타이머는 계속 흐름 (정지하지 않음)
            answered++;
            const feedback = document.getElementById('feedback-text');
            const info = document.getElementById('info-text');
            const q = currentQuestions[currentIndex];
            const exactMeaning = q.meaning;

            if (isCorrect) {
                score += 1; // 맞힌 문제 수
                document.getElementById('score-display').innerText = `맞힘: ${score}`;
                feedback.innerText = '정답입니다! 🎉';
                feedback.className = 'feedback correct';
            } else {
                feedback.innerText = '틀렸습니다! 😢';
                feedback.className = 'feedback incorrect';
            }

            if (currentMode === 1 || currentMode === 3) {
                info.innerText = `정답: ${q.idiom}`;
            } else if (currentMode === 4) {
                info.innerText = `정확한 뜻: ${exactMeaning}`;
            } else if (currentMode === 2 && !isCorrect) {
                info.innerText = `정답: ${exactMeaning}`;
            }

            document.getElementById('input-section').style.display = 'none';
            document.getElementById('options-section').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('next-btn').focus();
        }

        function nextQuestion() {
            if (gameOver) return;
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                endGame(); // 모든 문제를 다 풂
            }
        }

        function endGame() {
            if (gameOver) return;
            gameOver = true;
            stopTimer();
            showResult();
        }

        async function showResult() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';
            document.getElementById('result-area').style.flexDirection = 'column';
            document.getElementById('final-score').innerText =
                `${playerNickname}님이 ${formatTime(totalTime)} 동안\n맞힌 문제: ${score}개  (시도 ${answered}개)`;

            const status = document.getElementById('result-rank-status');
            const board = document.getElementById('result-leaderboard');
            // 이번 판 조건 (랭킹 비교 단위)
            const cond = { mode: currentMode, difficulty: difficulty, time_limit: totalTime };

            if (!SB_ENABLED) {
                status.innerText = '';
                board.innerHTML = '<div class="lb-empty">랭킹 서버 미설정 (.env.local 확인)</div>';
                return;
            }

            status.innerText = '기록 저장 중…';
            board.innerHTML = '<div class="lb-empty">불러오는 중…</div>';

            const accuracy = answered > 0 ? Math.round((score / answered) * 1000) / 1000 : 0;
            const saved = await sbInsertScore({
                nickname: playerNickname, ...cond,
                solved: score, attempted: answered, accuracy
            });

            const rows = await sbFetchLeaderboard(cond.mode, cond.difficulty, cond.time_limit);
            const myId = saved ? saved.id : null;
            renderLeaderboard(board, rows, myId);

            if (rows && myId != null) {
                const rank = rows.findIndex(r => r.id === myId);
                status.innerText = rank >= 0
                    ? `내 순위: ${rank + 1}위 / ${rows.length}명 (상위 30 기준)`
                    : `기록 저장됨 · 상위 30위권 밖`;
            } else if (!saved) {
                status.innerText = '⚠️ 기록 저장 실패 (아래 목록만 표시)';
            } else {
                status.innerText = '';
            }
        }

        // ---- 랭킹 패널 ----
        function showRanking() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('global-settings-btn').style.display = 'none';
            document.getElementById('ranking-area').style.display = 'flex';
            document.getElementById('ranking-area').style.flexDirection = 'column';
            loadRanking();
        }

        function hideRanking() {
            document.getElementById('ranking-area').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('global-settings-btn').style.display = 'block';
        }

        async function loadRanking() {
            const list = document.getElementById('ranking-list');
            const mode = parseInt(document.getElementById('rank-mode').value);
            const diff = document.getElementById('rank-difficulty').value;
            const time = parseInt(document.getElementById('rank-time').value);
            list.innerHTML = '<div class="lb-empty">불러오는 중…</div>';
            const rows = await sbFetchLeaderboard(mode, diff, time);
            renderLeaderboard(list, rows, null);
        }

        // ---- 초기화 ----
        document.getElementById('app-version').innerText = `v${APP_VERSION}`;
        loadSettings();
        // 로그인 상태 복원
        currentPlayer = localStorage.getItem(PLAYER_KEY) || null;
        updatePlayerUI();
    </script>
</body>
</html>
