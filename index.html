<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관용표현 & 속담 퀴즈</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Noto+Sans+KR:wght@300;500;700&family=Nanum+Myeongjo:wght@400;700;800&display=swap');

        :root {
            /* Light Theme (Default) */
            --bg-body: #f3f4f6;
            --bg-container: #ffffff;
            --bg-input: #f9fafb;
            --bg-btn: #f3f4f6;
            --bg-btn-hover: #e5e7eb;
            --bg-dict-list: #fafafa;
            --border-color: #e5e7eb;
            --text-main: #111827;
            --text-muted: #6b7280;
            --text-dim: #9ca3af;
            --highlight: #d97706;
        }

        [data-theme="dark"] {
            /* Dark Theme */
            --bg-body: #0a0a0a;
            --bg-container: #121212;
            --bg-input: #1e1e1e;
            --bg-btn: #1e1e1e;
            --bg-btn-hover: #2a2a2a;
            --bg-dict-list: #0f0f0f;
            --border-color: #333;
            --text-main: #ffffff;
            --text-muted: #888;
            --text-dim: #666;
            --highlight: #f3ec78;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
        }

        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Prevent browser scrollbar */
            padding: 2rem 0;
            transition: background 0.3s, color 0.3s;
        }

        .container {
            position: relative;
            text-align: center;
            background: var(--bg-container);
            padding: 3rem 4rem;
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.2);
            width: 50rem;
            max-width: 95vw;
            height: 48.75rem;
            max-height: 90vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: center;
            animation: fadeIn 0.5s ease-out;
            transition: background 0.3s, border-color 0.3s;
        }

        .container::-webkit-scrollbar { width: 8px; }
        .container::-webkit-scrollbar-track { background: transparent; }
        .container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        /* Dictionary & Settings Modal Style */
        .dict-container {
            background: var(--bg-container);
            border-radius: 1rem;
            border: 1px solid var(--border-color);
            width: 50rem;
            max-width: 95vw;
            height: 55rem;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            text-align: left;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.3s ease-out;
            transition: background 0.3s, border-color 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: -webkit-linear-gradient(45deg, #d97706, #be123c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        [data-theme="dark"] h1 {
            background: -webkit-linear-gradient(45deg, #f3ec78, #af4261);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Buttons */
        .menu-btn, .option-btn, .action-btn {
            display: block;
            width: 100%;
            padding: 1rem;
            margin: 0.5rem 0;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--text-main);
            background: var(--bg-btn);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .menu-btn:hover, .option-btn:hover, .action-btn:hover {
            background: var(--bg-btn-hover);
            transform: translateY(-2px);
        }

        .input-box {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 1.1rem;
            color: var(--text-main);
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            outline: none;
            transition: background 0.3s, border-color 0.3s, color 0.3s;
        }

        .input-box::placeholder {
            color: var(--text-dim);
        }

        #game-area, #result-area, #dict-area, #settings-area, #setup-area {
            display: none;
        }

        /* Game Area specific */
        .question {
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }
        .feedback { margin-top: 1rem; font-size: 1.1rem; font-weight: bold; min-height: 1.5rem; }
        .correct { color: #16a34a; }
        [data-theme="dark"] .correct { color: #4ade80; }
        .incorrect { color: #dc2626; }
        [data-theme="dark"] .incorrect { color: #f87171; }
        
        .info { color: #2563eb; margin-top: 0.5rem; font-size: 0.95rem; font-weight: normal; }
        [data-theme="dark"] .info { color: #60a5fa; }
        
        .header { display: flex; justify-content: space-between; margin-bottom: 2rem; font-size: 1rem; color: var(--text-dim); }

        /* Dictionary Area specific */
        .dict-header {
            display: flex;
            align-items: center;
            margin-bottom: 1rem;
        }
        .dict-badge {
            background: var(--text-main);
            color: var(--bg-container);
            font-size: 0.75rem;
            font-weight: 900;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 10px;
        }
        .dict-subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .dict-title-row {
            display: flex;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .dict-title-row h2 {
            font-size: 2rem;
            color: var(--text-main);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Close Button (X icon) */
        .close-btn {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            background: transparent;
            color: var(--text-dim);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s, transform 0.3s;
        }
        .close-btn:hover {
            color: #ef4444; /* red */
            transform: scale(1.1);
        }

        /* Settings Button */
        .settings-btn {
            position: fixed;
            bottom: 1.5rem;
            left: 1.5rem;
            background: transparent;
            color: var(--text-dim);
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s ease;
        }
        .settings-btn:hover {
            color: var(--text-main);
            transform: rotate(45deg);
        }

        /* Creator Info */
        .creator-info {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            color: var(--text-dim);
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.8;
            pointer-events: none;
            text-align: right;
        }

        /* Version Tag */
        .version-tag {
            margin-top: 2px;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            opacity: 0.75;
        }

        /* Tabs */
        .dict-tabs {
            display: flex;
            background: var(--bg-input);
            border-radius: 8px;
            padding: 4px;
            margin-bottom: 1rem;
        }
        .dict-tab {
            flex: 1 1 50%;
            width: 50%;
            padding: 0.8rem;
            text-align: center;
            color: var(--text-muted);
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
            box-sizing: border-box;
        }
        .dict-tab.active {
            background: var(--text-main);
            color: var(--bg-container);
        }

        /* Search */
        .dict-search {
            width: 100%;
            padding: 0.8rem 1rem;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            margin-bottom: 1rem;
            font-size: 0.95rem;
            outline: none;
        }
        .dict-search::placeholder {
            color: var(--text-dim);
        }

        /* Table/List */
        .dict-list-container {
            flex: 1;
            overflow-y: scroll;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-dict-list);
        }
        .dict-list-container::-webkit-scrollbar { width: 8px; }
        .dict-list-container::-webkit-scrollbar-track { background: var(--bg-container); }
        .dict-list-container::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }

        .dict-row {
            display: flex;
            padding: 1rem;
            border-bottom: 1px solid var(--border-color);
            align-items: flex-start;
        }
        .dict-row:last-child {
            border-bottom: none;
        }
        .dict-col-index {
            width: 3rem;
            color: var(--text-dim);
            font-size: 0.9rem;
            text-align: center;
            flex-shrink: 0;
        }
        .dict-col-word {
            width: 35%;
            color: var(--text-main);
            font-weight: bold;
            font-size: 1rem;
            padding-right: 1rem;
            flex-shrink: 0;
        }
        .dict-divider {
            width: 1px;
            background: var(--border-color);
            height: 1.5rem;
            margin: 0 1rem;
            flex-shrink: 0;
        }
        .dict-col-meaning {
            flex: 1;
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* Close Button */
        .dict-close-btn {
            width: 100%;
            padding: 1rem;
            margin-top: 1.5rem;
            background: var(--text-main);
            color: var(--bg-container);
            border: none;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s, opacity 0.2s;
        }
        .dict-close-btn:hover {
            opacity: 0.8;
        }
        
        /* Settings Switches */
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 1.5rem;
            background: var(--bg-input);
            border-radius: 8px;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .settings-item span {
            font-size: 1.1rem;
            font-weight: 500;
        }

        /* ---- 반응형 (모바일 / 작은 화면) ---- */
        @media (max-width: 600px) {
            html { font-size: 15px; }
            body {
                height: 100dvh;
                padding: 0.75rem 0;
            }
            h1 { font-size: 2rem; }

            .container {
                padding: 2rem 1.25rem;
                height: auto;
                max-height: 94vh;
                width: 100%;
                max-width: 94vw;
            }

            .dict-container {
                padding: 1.25rem;
                height: auto;
                max-height: 94vh;
                width: 100%;
                max-width: 94vw;
            }

            /* 인라인 height/padding 가진 설정 화면 override */
            #settings-area {
                height: auto !important;
                max-height: 94vh !important;
                padding: 2rem 1.25rem !important;
            }

            .menu-btn, .option-btn, .action-btn {
                font-size: 1rem;
                padding: 0.9rem;
            }

            .settings-btn {
                bottom: 0.75rem;
                left: 0.75rem;
                font-size: 1.3rem;
            }
            .creator-info {
                bottom: 0.75rem;
                right: 0.75rem;
                font-size: 0.8rem;
            }

            /* 도감 행: 좁은 화면에서 단어/뜻 세로 배치 */
            .dict-col-word { width: 42%; }
            .dict-divider { margin: 0 0.5rem; }
        }

    </style>
</head>
<body>
    <div id="app">
        <!-- Settings Button -->
        <button class="settings-btn" id="global-settings-btn" title="설정" onclick="showSettings()">⚙️</button>

        <!-- Creator Info -->
        <div class="creator-info">
            <div>by. 청아초 삼다수반</div>
            <div class="version-tag" id="app-version"></div>
        </div>

        <!-- Main Menu -->
        <div class="container" id="main-menu">
            <h1>관용표현 & 속담 퀴즈</h1>
            <p style="margin-bottom: 2rem; color: var(--text-dim);">재미있게 배우는 우리말 관용표현과 속담!</p>
            
            <button class="menu-btn" style="border-color: var(--highlight); margin-bottom: 2rem; color: var(--highlight);" onclick="showDict()">📚 관용표현 사전</button>

            <button class="menu-btn" onclick="openSetup(1)">1. 뜻 보고 맞추기 (주관식)</button>
            <button class="menu-btn" onclick="openSetup(2)">2. 단어 보고 뜻 맞추기 (객관식)</button>
            <button class="menu-btn" onclick="openSetup(3)">3. 초성 퀴즈 (주관식)</button>
            <button class="menu-btn" onclick="openSetup(4)">4. 뜻 적기 퀴즈 (키워드 주관식)</button>
        </div>

        <!-- Settings Area -->
        <div class="container" id="settings-area" style="max-width: 600px; height: 45rem; max-height: 90vh; padding: 4rem 3rem; overflow-y: auto; justify-content: flex-start;">
            <h2 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; background: -webkit-linear-gradient(45deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent;"><span style="-webkit-text-fill-color: initial; background: none;">⚙️</span> 환경 설정</h2>
            <p style="margin-bottom: 1.5rem; color: var(--text-dim);">앱의 테마와 환경을 설정할 수 있습니다.</p>

            <div class="settings-item">
                <span>🎨 화면 테마 (다크/라이트)</span>
                <button class="action-btn" style="width: auto; padding: 0.5rem 1.5rem;" onclick="toggleTheme()" id="theme-toggle-btn">다크 모드로 변경</button>
            </div>



            <button class="menu-btn" style="margin-top: auto;" onclick="hideSettings()">저장 및 닫기</button>
        </div>

        <!-- Dictionary (도감) Area -->
        <div class="dict-container" id="dict-area">
            <div class="dict-header">
                <span class="dict-badge">DICT</span>
                <span class="dict-subtitle">— 속담 + 관용어</span>
            </div>
            
            <div class="dict-title-row">
                <h2>📚 <span id="dict-main-title">속담 사전</span></h2>
            </div>

            <div class="dict-tabs">
                <div class="dict-tab active" id="tab-proverb" onclick="switchTab('속담')">속담 (<span id="count-proverb">0</span>)</div>
                <div class="dict-tab" id="tab-idiom" onclick="switchTab('관용어')">관용어 (<span id="count-idiom">0</span>)</div>
            </div>

            <input type="text" class="dict-search" id="dict-search-input" placeholder="🔍 검색 (예: 가는, 호랑이, 마음)" oninput="renderDictList()">

            <div class="dict-list-container" id="dict-list">
                <!-- 동적으로 채워짐 -->
            </div>

            <button class="dict-close-btn" onclick="hideDict()">닫기</button>
        </div>

        <!-- Setup Area -->
        <div class="container" id="setup-area">
            <button class="close-btn" onclick="hideSetup()">✕</button>
            <h2 style="font-size: 2rem; margin-bottom: 1rem;">🕹️ 게임 세부 설정</h2>
            
            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label style="font-weight: bold; display: block; margin-bottom: 0.5rem;">👤 플레이어 닉네임</label>
                <input type="text" id="setup-nickname" class="input-box" placeholder="이름을 입력하세요 (미입력 시 '플레이어')" style="margin: 0;">
            </div>

            <div style="text-align: left; margin-bottom: 1.5rem;">
                <label style="font-weight: bold; display: block; margin-bottom: 0.5rem;">⏳ 제한시간 (문제당)</label>
                <select id="setup-time" class="input-box" style="margin: 0; cursor: pointer;">
                    <option value="0">무제한</option>
                    <option value="5">5초</option>
                    <option value="10" selected>10초</option>
                    <option value="15">15초</option>
                </select>
            </div>

            <div style="text-align: left; margin-bottom: 2rem;">
                <label style="font-weight: bold; display: block; margin-bottom: 0.5rem;">🎯 문제 수 (라운드)</label>
                <select id="setup-rounds" class="input-box" style="margin: 0; cursor: pointer;">
                    <option value="5" selected>5문제</option>
                    <option value="10">10문제</option>
                    <option value="15">15문제</option>
                    <option value="all">전체 다 풀기</option>
                </select>
            </div>

            <button class="menu-btn" style="background: var(--highlight); color: white; border: none; font-size: 1.2rem; font-weight: bold; padding: 1.2rem;" onclick="executeGameStart()">🚀 게임 시작!</button>
        </div>

        <!-- Game Area -->
        <div class="container" id="game-area">
            <button class="close-btn" title="게임 종료" onclick="goHome()">✖</button>
            <div class="header">
                <span id="score-display">점수: 0</span>
                <span id="timer-display" style="font-weight: bold; color: #ef4444; font-size: 1.2rem; display: none;">남은 시간: <span id="time-left">10</span>초</span>
                <span id="progress-display">1 / 5</span>
            </div>
            <div id="question-text" class="question">질문 내용</div>
            
            <div id="input-section" style="display: none;">
                <input type="text" id="answer-input" class="input-box" placeholder="정답을 입력하세요" onkeypress="if(event.key === 'Enter') submitAnswer()">
                <button class="action-btn" onclick="submitAnswer()">확인</button>
            </div>
            
            <div id="options-section" style="display: none;">
                <!-- 객관식 버튼들이 동적으로 추가됨 -->
            </div>

            <div id="feedback-text" class="feedback"></div>
            <div id="info-text" class="info"></div>
            
            <button id="next-btn" class="action-btn" style="display: none; margin-top: 1rem; background: #3b82f6;" onclick="nextQuestion()">다음 문제</button>
        </div>

        <!-- Result Area -->
        <div class="container" id="result-area">
            <h1>게임 종료!</h1>
            <p id="final-score" style="font-size: 1.5rem; margin-bottom: 2rem;"></p>
            <button class="action-btn" onclick="goHome()">메인으로 돌아가기</button>
        </div>
    </div>

    <script>
        // ---- App Version (유의적 버전, SemVer) ----
        // package.json의 "version"과 항상 동일하게 유지할 것
        const APP_VERSION = "2.0.2";

        const DB = [
            // 관용어 (음슴체 및 간소화)
            { type: "관용어", idiom: "발목을 잡다", meaning: "어떤 일에 얽매여 못 벗어남", chosung: "ㅂㅁㅇ ㅈㄷ", keywords: ["얽매여", "벗어나", "못하게", "방해"] },
            { type: "관용어", idiom: "미역국을 먹다", meaning: "시험이나 직장에서 떨어짐", chosung: "ㅁㅇㄱㅇ ㅁㄷ", keywords: ["떨어지", "쫓겨나", "낙방", "불합격", "해고"] },
            { type: "관용어", idiom: "귀가 얇다", meaning: "남의 말을 쉽게 믿음", chosung: "ㄱㄱ ㅇㄷ", keywords: ["남", "말", "쉽게", "받아들이", "믿다", "솔깃"] },
            { type: "관용어", idiom: "눈코 뜰 새 없다", meaning: "매우 바쁨", chosung: "ㄴㅋ ㄸ ㅅ ㅇㄷ", keywords: ["바쁘", "바빠", "정신없이"] },
            { type: "관용어", idiom: "입이 무겁다", meaning: "비밀을 잘 지킴", chosung: "ㅇㅇ ㅁㄱㄷ", keywords: ["비밀", "지키", "발설"] },
            { type: "관용어", idiom: "간에 기별도 안 가다", meaning: "먹은 양이 너무 적음", chosung: "ㄱㅇ ㄱㅂㄷ ㅇ ㄱㄷ", keywords: ["적어", "적다", "먹은 것 같지", "부족"] },
            { type: "관용어", idiom: "손이 크다", meaning: "씀씀이가 큼", chosung: "ㅅㅇ ㅋㄷ", keywords: ["씀씀이", "후하", "크다", "많이", "풍족"] },

        // ---- Settings 저장/복원 (localStorage) ----
        const SETTINGS_KEY = 'gystudy-settings';

        function saveSettings() {
            try {
                localStorage.setItem(SETTINGS_KEY, JSON.stringify({
                    isDarkMode
                }));
            } catch (e) { /* localStorage 미지원/차단 시 무시 */ }
        }

        function loadSettings() {
            let saved = null;
            try {
                saved = JSON.parse(localStorage.getItem(SETTINGS_KEY));
            } catch (e) { /* 파싱 실패 시 기본값 사용 */ }
            if (!saved) return;

            // 테마 복원
            if (saved.isDarkMode) {
                isDarkMode = true;
                document.body.setAttribute('data-theme', 'dark');
                document.getElementById('theme-toggle-btn').innerText = '라이트 모드로 변경';
            }
        }

        // ---- Settings Theme & Logic ----
        let isDarkMode = false;
        function toggleTheme() {
            const body = document.body;
            const btn = document.getElementById('theme-toggle-btn');

            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                body.setAttribute('data-theme', 'dark');
                btn.innerText = '라이트 모드로 변경';
            } else {
                body.removeAttribute('data-theme');
                btn.innerText = '다크 모드로 변경';
            }
            saveSettings();
        }

        function showSettings() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('settings-area').style.display = 'flex';
            document.getElementById('global-settings-btn').style.display = 'none';

        function hideSettings() {
            document.getElementById('settings-area').style.display = 'none';

            document.getElementById('global-settings-btn').style.display = 'block';
        }

        // ---- 도감(Dictionary) Logic ----
        let currentDictType = '속담'; // 기본값

        function initDictData() {
            const proverbCount = DB.filter(item => item.type === "속담").length;
            const idiomCount = DB.filter(item => item.type === "관용어").length;
            document.getElementById('count-proverb').innerText = proverbCount;
            document.getElementById('count-idiom').innerText = idiomCount;
        }

            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('global-settings-btn').style.display = 'none';
            document.getElementById('dict-area').style.display = 'flex';
            initDictData();
            switchTab('속담'); // 열 때 항상 속담 탭으로 초기화
        }

        function hideDict() {
            document.getElementById('dict-area').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
            document.getElementById('global-settings-btn').style.display = 'block';
        }

        function switchTab(type) {
            currentDictType = type;
            document.getElementById('dict-main-title').innerText = `${type} 사전`;
            
            // 탭 스타일 변경
            document.getElementById('tab-proverb').className = type === '속담' ? 'dict-tab active' : 'dict-tab';
            document.getElementById('tab-idiom').className = type === '관용어' ? 'dict-tab active' : 'dict-tab';
            
            // 검색어 초기화
            document.getElementById('dict-search-input').value = '';
            
            renderDictList();
        }

        function renderDictList() {
            const listContainer = document.getElementById('dict-list');
            const searchKeyword = document.getElementById('dict-search-input').value.trim().toLowerCase();
            
            let filtered = DB.filter(item => item.type === currentDictType);
            
            if (searchKeyword) {
                filtered = filtered.filter(item => 
                    item.idiom.toLowerCase().includes(searchKeyword) || 
                    (item.meaning && item.meaning.toLowerCase().includes(searchKeyword))
                );
            }

            let html = '';
            if (filtered.length === 0) {
                html = '<div style="padding: 2rem; text-align: center; color: var(--text-dim);">검색 결과가 없습니다.</div>';
            } else {
                filtered.forEach((item, index) => {
                    const exactMeaning = item.meaning;
                    html += `
                        <div class="dict-row">
                            <div class="dict-col-index">${index + 1}</div>
                            <div class="dict-col-word">${item.idiom}</div>
                            <div class="dict-divider"></div>
                            <div class="dict-col-meaning">${exactMeaning}</div>
                        </div>
                    `;
                });
            }
            
            listContainer.innerHTML = html;
        }

        // ---- Quiz Game Logic ----
        let currentMode = 1;
        let currentQuestions = [];

        let score = 0;
        
        // 추가된 상태 변수들
        let playerNickname = "플레이어";
        let timeLimit = 0;
        let totalRounds = 5;
        let timerInterval = null;
        let timeRemaining = 0;
        let setupMode = 1;

        function shuffle(array) {
            let currentIndex = array.length,  randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

            const nickInput = document.getElementById('setup-nickname').value.trim();
            playerNickname = nickInput ? nickInput : "플레이어";
            timeLimit = parseInt(document.getElementById('setup-time').value);
            const roundInput = document.getElementById('setup-rounds').value;
            totalRounds = roundInput === 'all' ? DB.length : parseInt(roundInput);

            document.getElementById('setup-area').style.display = 'none';
            startGame(setupMode);
        }

        function startGame(mode) {
            currentMode = mode;
            score = 0;
            currentIndex = 0;
            
            let maxAvailable = Math.min(totalRounds, DB.length);
            currentQuestions = shuffle([...DB]).slice(0, maxAvailable);
            totalRounds = currentQuestions.length; // 실제 문제 수로 업데이트
            
            document.getElementById('game-area').style.display = 'flex';
            document.getElementById('game-area').style.flexDirection = 'column';
            
            loadQuestion();
        }

        function startTimer() {
            stopTimer(); // 기존 타이머 클리어
            if (timeLimit > 0) {
                timeRemaining = timeLimit;
                const timerDisplay = document.getElementById('timer-display');
                const timeLeftSpan = document.getElementById('time-left');
                
                timerDisplay.style.display = 'inline';
                timeLeftSpan.innerText = timeRemaining;
                
                timerInterval = setInterval(() => {
                    timeRemaining--;
                    timeLeftSpan.innerText = timeRemaining;
                    if (timeRemaining <= 0) {
                        stopTimer();
                        showFeedback(false, true); // 시간 초과로 오답 처리
                    }
                }, 1000);
            } else {
                document.getElementById('timer-display').style.display = 'none';
            }
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function loadQuestion() {
            document.getElementById('feedback-text').innerText = '';
            document.getElementById('info-text').innerText = '';
            document.getElementById('next-btn').style.display = 'none';
            document.getElementById('score-display').innerText = `점수: ${Math.round(score)}`;
            document.getElementById('progress-display').innerText = `${currentIndex + 1} / ${currentQuestions.length}`;
            
            const q = currentQuestions[currentIndex];
            const qText = document.getElementById('question-text');
            const inputSec = document.getElementById('input-section');
            const optionsSec = document.getElementById('options-section');
            const inputField = document.getElementById('answer-input');

            inputSec.style.display = 'none';
            optionsSec.style.display = 'none';
            inputField.value = '';

            let label = q.type === "속담" ? "속담" : "관용표현";
            let exactMeaning = q.meaning;

            if (currentMode === 1) {
                qText.innerText = `뜻: ${exactMeaning}\n\n이 뜻을 가진 ${label}은(는)?`;
                inputSec.style.display = 'block';
                inputField.focus();
            } else if (currentMode === 2) {
                qText.innerText = `${label}: "${q.idiom}"\n\n이 ${label}의 올바른 뜻은?`;
                optionsSec.style.display = 'block';
                optionsSec.innerHTML = '';
                
                let options = [exactMeaning];
                let others = shuffle([...DB].filter(item => item.idiom !== q.idiom)).slice(0, 3);
                others.forEach(o => options.push(o.meaning));
                options = shuffle(options);
                
                options.forEach(opt => {
                    let btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.innerText = opt;
                    btn.onclick = () => checkOption(opt, exactMeaning);
                    optionsSec.appendChild(btn);
                });
            } else if (currentMode === 3) {
                qText.innerText = `초성: ${q.chosung}\n뜻: ${exactMeaning}\n\n이 ${label}은(는)?`;
                inputSec.style.display = 'block';
                inputField.focus();
            } else if (currentMode === 4) {
                qText.innerText = `${label}: "${q.idiom}"\n\n이 ${label}의 뜻을 적어보세요.\n(핵심 단어가 포함되어야 합니다)`;
                inputSec.style.display = 'block';
                inputField.focus();
            }
            
            startTimer();
        }

        function submitAnswer() {
            const q = currentQuestions[currentIndex];
            const input = document.getElementById('answer-input').value.trim();
            if (!input) return;

            let isCorrect = false;

            if (currentMode === 1 || currentMode === 3) {
                if (input.replace(/\s/g, '') === q.idiom.replace(/\s/g, '')) {
                    isCorrect = true;
                }
            } else if (currentMode === 4) {
                let matchCount = q.keywords.filter(kw => input.includes(kw)).length;
                if (matchCount > 0) {
                    isCorrect = true;
                }
            }

            showFeedback(isCorrect);
        }

        function checkOption(selected, correct) {
            showFeedback(selected === correct);
        }

        function showFeedback(isCorrect, isTimeOut = false) {
            stopTimer(); // 피드백 표시 시 타이머 정지
            const feedback = document.getElementById('feedback-text');
            const info = document.getElementById('info-text');
            const q = currentQuestions[currentIndex];
            const exactMeaning = q.meaning;
            
            if (isCorrect) {
                score += (100 / totalRounds); // 총 문항 수에 비례한 점수
                document.getElementById('score-display').innerText = `점수: ${Math.round(score)}`;
                feedback.innerText = '정답입니다! 🎉';
                feedback.className = 'feedback correct';
            } else {
                if (isTimeOut) {
                    feedback.innerText = '시간 초과! ⏳';
                } else {
                    feedback.innerText = '틀렸습니다! 😢';
                }
                feedback.className = 'feedback incorrect';
            }

            if (currentMode === 1 || currentMode === 3) {
                info.innerText = `정답: ${q.idiom}`;
            } else if (currentMode === 4) {
                info.innerText = `정확한 뜻: ${exactMeaning}`;
            } else if (currentMode === 2 && !isCorrect) {
                info.innerText = `정답: ${exactMeaning}`;
            }

            document.getElementById('input-section').style.display = 'none';
            document.getElementById('options-section').style.display = 'none';
            document.getElementById('next-btn').style.display = 'block';
            document.getElementById('next-btn').focus();
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex < currentQuestions.length) {
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('game-area').style.display = 'none';
            document.getElementById('result-area').style.display = 'flex';
            document.getElementById('result-area').style.flexDirection = 'column';
            document.getElementById('final-score').innerText = `${playerNickname}님의 최종 점수: ${Math.round(score)}점 / 100점`;
        }

        // ---- 초기화 ----
        document.getElementById('app-version').innerText = `v${APP_VERSION}`;
        loadSettings();
    </script>
</body>
</html>
